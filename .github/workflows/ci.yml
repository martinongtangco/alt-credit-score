name: CI — Lint, Test, Fairness Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 src/ --max-line-length=120 --ignore=E203,W503 || true

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Fairness Gate
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from tests.test_fairness_gate import test_fairness_gate_passes
          try:
              test_fairness_gate_passes()
              print('FAIRNESS GATE: PASSED')
          except AssertionError as e:
              print(f'FAIRNESS GATE: FAILED — {e}')
              sys.exit(1)
          "
        continue-on-error: false
